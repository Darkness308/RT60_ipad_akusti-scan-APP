name: CI (honest)

# Purpose: a single, non-masking pipeline that reflects the TRUE state of the
# repository. Unlike the legacy workflows, this one does NOT swallow failures
# with `|| true`, retries, or auto-fix steps. If something does not build or a
# test fails, this job fails. That is the point.
#
# It verifies three things independently:
#   1. The platform-independent Swift packages build and their tests pass.
#   2. The Export module builds and its tests pass.
#   3. The actual iOS application compiles via xcodebuild (iOS Simulator SDK).
#
# Step 3 is the verification gap the legacy CI never covered: no workflow ever
# ran `xcodebuild` against AcoustiScanApp.xcodeproj, so the app could (and did)
# fail to compile without CI noticing.
#
# On failure each job writes the tail of the captured output to the run's job
# summary ($GITHUB_STEP_SUMMARY), so the actual error is visible on the run page
# without having to expand the (JS-loaded) raw logs.

on:
  push:
    branches: [ main, develop, "claude/**" ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  packages:
    name: Swift packages (build + test)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain versions
        run: |
          xcodebuild -version || true
          swift --version || true

      - name: Build & test AcoustiScanConsolidated
        run: |
          set -o pipefail
          cd AcoustiScanConsolidated
          { swift build && swift test ; } 2>&1 | tee "$RUNNER_TEMP/consolidated.log"

      - name: Build & test ReportExport module
        run: |
          set -o pipefail
          cd Modules/Export
          { swift build && swift test ; } 2>&1 | tee "$RUNNER_TEMP/export.log"

      - name: Summarize failure
        if: failure()
        run: |
          {
            echo '## Swift packages — failure detail'
            for f in consolidated export; do
              log="$RUNNER_TEMP/$f.log"
              echo "### $f (tail)"
              echo '```'
              tail -n 150 "$log" 2>/dev/null || echo "(no output captured — step likely failed before running)"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

  ios-app:
    name: iOS app (xcodebuild)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain + available simulators
        run: |
          xcodebuild -version || true
          xcodebuild -list -project AcoustiScanApp/AcoustiScanApp.xcodeproj 2>&1 | tee "$RUNNER_TEMP/list.log" || true

      - name: Build iOS app for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project AcoustiScanApp/AcoustiScanApp.xcodeproj \
            -scheme AcoustiScanApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"

      - name: Summarize failure
        if: failure()
        run: |
          {
            echo '## iOS app — failure detail'
            echo '### xcodebuild -list'
            echo '```'
            tail -n 60 "$RUNNER_TEMP/list.log" 2>/dev/null || echo "(scheme listing failed)"
            echo '```'
            echo '### xcodebuild build (filtered errors)'
            echo '```'
            grep -E "error:|warning:|note:|fatal|Command|Cannot|cannot find|No such|Undefined" "$RUNNER_TEMP/xcodebuild.log" 2>/dev/null | tail -n 120 \
              || tail -n 120 "$RUNNER_TEMP/xcodebuild.log" 2>/dev/null \
              || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
